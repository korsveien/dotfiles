bind r source-file ~/.config/tmux/tmux.conf

set -g status-right '#(TZ=Asia/Singapore date +%%d\ %%a\ %%H:%%M\) '
set -g base-index 1 # Start window numbering on 1
set -g mouse on
set -g mode-keys vi

set -g window-status-current-format ' #I:#W '
set -g window-status-current-style bg=#181616,fg=green
